# App-level preferences only. Do NOT set [server] host/port/CORS here:
# Streamlit Community Cloud manages those itself and forcing them breaks its
# health check. Container/proxy server flags are passed by entrypoint.sh
# (--server.port/address/enableCORS/enableXsrfProtection) for Docker deploys.
[browser]
gatherUsageStats = false

[theme]
base = "light"
